<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Steam Promo Watch History</title>
    <link rel="stylesheet" href="./history.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Steam Promo Watch</p>
          <h1>History</h1>
          <p id="history-note" class="lead"></p>
        </div>
        <a class="header-link" href="./options.html">Open settings</a>
      </header>

      <section class="panel">
        <div id="empty-state" class="empty-state hidden">History is empty.</div>
        <table id="history-table" class="history-table hidden">
          <thead>
            <tr>
              <th>Title</th>
              <th>Type</th>
              <th>Content</th>
              <th>Status</th>
              <th>First seen</th>
              <th>Last notified</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="./history.js"></script>
  </body>
  </html>
